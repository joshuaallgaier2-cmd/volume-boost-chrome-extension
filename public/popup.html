<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume Booster</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>🔊 Volume Booster</h1>

        <div class="toggle-container">
            <button id="toggleButton" aria-label="Toggle volume boost">Activate Boost</button>
        </div>

        <div class="volume-control">
            <p>Boost Level: <span id="boostLevelDisplay">100%</span></p>
            <input type="range" id="volumeSlider" min="0" max="5" value="1" step="0.1">
        </div>

        <div class="status-area">
            <p>Status: <span id="statusMessage">Ready</span></p>
            <button id="closeButton">Close</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
