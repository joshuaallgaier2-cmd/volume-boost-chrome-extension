<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volume Boost</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 14px;
        min-width: 240px;
        background: #111827;
        color: #f9fafb;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
      }
      input[type="range"] {
        width: 100%;
        margin: 6px 0 8px;
      }
      .value {
        font-weight: 600;
        font-size: 14px;
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <h1>Volume Boost</h1>
    <label for="boost">Boost level</label>
    <input id="boost" type="range" min="1" max="5" step="0.5" value="1" />
    <div class="value" id="value">1.0x</div>
    <script src="popup.js"></script>
  </body>
</html>
